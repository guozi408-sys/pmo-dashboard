<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PMO Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="header">
  <div class="header-main"><div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div><div class="build-mark" id="version"></div></div>
  <div class="header-controls">
    <nav class="tabs">
      <button class="tab active" data-mode="shared">プロジェクト共有</button>
    </nav>
    <div class="language-switch"><button class="lang-btn active" data-language="ja">日本語</button><button class="lang-btn" data-language="zh-CN">中文</button></div>
  </div>
</header>
<main class="container">
  <section id="shared" class="mode active">
    <div class="view-toolbar"><p id="shared-note"></p><button class="btn" onclick="window.print()">印刷</button></div>
    <div id="shared-summary" class="summary-grid shared-summary-grid"></div>
    <div class="shared-layout">
      <section class="panel"><h2 id="progress-title"></h2><div id="project-gantt"></div></section>
      <section class="panel" id="shared-qa-panel">
        <div class="panel-head"><h2>QA</h2><span class="panel-note" id="qa-total"></span></div>
        <div id="qa-filters" class="filter-row"></div>
        <div id="shared-qa"></div>
      </section>
      <section class="panel"><h2 id="shared-artifact-title"></h2><div id="shared-artifacts" class="artifact-tree"></div></section>
    </div>
  </section>
</main>
<script src="js/data.js"></script>
<script>
const D=window.PMO_DATA;
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let lang='ja',activeQueue='decision',activeQa='waiting_customer',activeStage=null,sessionToken='',captureItem=null;
const text=(ja,zh)=>lang==='zh-CN'?zh:ja;
const fallback=v=>typeof v==='object'&&v?(v[lang]||v.ja||v['zh-CN']||''):v;
const queueLabels={decision:['要決定','要决定'],overdue:['期限超過','逾期'],change_candidate:['変更候補','变更候选'],customer_waiting:['顧客回答待ち','等待客户回复'],auto_processed:['自動処理済み','自动处理完成']};
const qaLabels={all:['すべて','全部'],waiting_customer:['回答待ち','等待回复'],answer_received:['回答受領','已收到回复'],under_review:['確認中','确认中'],resolved:['解決済み','已解决'],overdue:['期限超過','逾期']};
const actionLabels={accept:['Accept','接受'],edit:['Edit','编辑'],escalate:['Escalate','升级'],complete:['完了','完成'],extend:['延期','延期'],follow_up:['Follow-up','跟进'],edit_due_date:['期限変更','修改期限'],accept_update:['更新として受入','接受为更新'],create_revision:['Revision作成','创建修订'],create_change_request:['Change Request','变更申请'],dismiss:['却下','驳回'],view_details:['詳細','详情']};
const statusLabel=v=>({review_required:['レビュー待ち','等待评审'],ready_for_approval:['承認待ち','等待批准'],approved:['確認済み','已确认'],in_review:['レビュー中','评审中'],draft:['作成中','编制中'],not_started:['未着手','未开始'],completed:['完了','完成'],in_progress:['進行中','进行中'],planned:['計画','计划'],tentative:['暫定','暂定'],delayed:['遅延','延迟']}[v]||[v||'-',v||'-']);
function setHeader(){$('title').textContent=fallback(D.meta.title);$('subtitle').textContent=fallback(D.meta.subtitle);$('version').textContent=`${D.meta.version} · ${D.meta.updated_at||'-'}`;$('shared-note').textContent=text('進捗・QA・成果物状況を参照する読み取り専用ページです。','只读查看进度、QA和成果物状态。');$('shared-artifact-title').textContent=text('成果物状況','成果物状态');$('progress-title').textContent=text('プロジェクト進捗・日程','项目进度・日程');}
function qaCounts(){return D.views.project_shared.qa_counts||{};}
function selectSharedTab(){}
function focusQa(){selectSharedTab();const counts=qaCounts();activeQa=(counts.waiting_customer||0)?'waiting_customer':((counts.overdue||0)?'overdue':availableQaStatuses()[0]||'all');location.hash=`qa/${activeQa}`;renderQaFilters();renderQa();setTimeout(()=>$('shared-qa-panel').scrollIntoView({behavior:'smooth',block:'start'}),0);}
function renderSharedSummary(){const s=D.summary,cards=[['phase',text('現在フェーズ','当前阶段'),s.current_phase],['status',text('プロジェクト状態','项目状态'),s.status],['qa',text('要確認QA','待确认QA'),`${s.qa_waiting||0}${text('件','项')}`],['artifacts',text('成果物進捗','成果物进度'),`${s.artifact_completed||0} / ${s.artifact_count||0}`]];$('shared-summary').innerHTML=cards.map(c=>`<button class="summary-card clickable ${c[0]==='phase'||c[0]==='status'?'informational':''}" data-shared-target="${c[0]}"><span>${esc(c[1])}</span><strong>${esc(c[2])}</strong></button>`).join('');document.querySelector('[data-shared-target="phase"]').onclick=()=>{activeStage=(D.views.project_shared.gantt||[])[0]?.stage_id||null;renderGantt();$('project-gantt').scrollIntoView({behavior:'smooth'});};document.querySelector('[data-shared-target="status"]').onclick=()=>$('project-gantt').scrollIntoView({behavior:'smooth'});document.querySelector('[data-shared-target="qa"]').onclick=focusQa;document.querySelector('[data-shared-target="artifacts"]').onclick=()=>$('shared-artifacts').scrollIntoView({behavior:'smooth'});}
function availableQaStatuses(){const counts=qaCounts(),order=['waiting_customer','answer_received','under_review','resolved','overdue'];return order.filter(k=>(counts[k]||0)>0);}
function renderQaFilters(){const counts=qaCounts(),order=[...availableQaStatuses(),'all'];if(activeQa!=='all'&&!order.includes(activeQa))activeQa=order[0]||'all';$('qa-filters').innerHTML=order.map(k=>`<button class="filter-btn ${activeQa===k?'active':''}" data-qa-filter="${k}">${esc(text(...qaLabels[k]))} ${k==='all'?D.views.project_shared.qa_items.length:(counts[k]||0)}</button>`).join('');document.querySelectorAll('[data-qa-filter]').forEach(b=>b.onclick=()=>{activeQa=b.dataset.qaFilter;location.hash=`qa/${activeQa}`;renderQaFilters();renderQa();});}
function renderQa(){let items=D.views.project_shared.qa_items||[];if(activeQa!=='all')items=items.filter(x=>x.shared_status===activeQa);$('qa-total').textContent=`${items.length}${text('件','项')}`;if(!items.length){$('shared-qa').innerHTML=`<div class="empty-state">${text('該当するQAはありません。','没有对应QA。')}</div>`;return;}$('shared-qa').innerHTML=`<div class="table-wrap"><table class="qa-table"><thead><tr><th>No.</th><th>${text('区分','分类')}</th><th>${text('確認事項','确认事项')}</th><th>${text('確認背景・目的','确认背景・目的')}</th><th>${text('回答','回答')}</th><th>${text('回答日','回答日期')}</th><th>${text('回答者','回答人')}</th><th>Status</th></tr></thead><tbody>${items.map((x,i)=>`<tr><td>${esc(x.number||x.qa_id||i+1)}</td><td>${esc(fallback(x.category)||'-')}</td><td class="long-text">${esc(fallback(x.question)||'-')}</td><td class="long-text">${esc(fallback(x.background)||'-')}</td><td class="long-text">${esc(fallback(x.answer)||'—')}</td><td>${esc(x.answer_date||'—')}</td><td>${esc(x.answered_by||'—')}</td><td><span class="status-chip ${esc(x.shared_status)}">${esc(text(...qaLabels[x.shared_status]))}</span></td></tr>`).join('')}</tbody></table></div>`;}
function monthStart(v){const d=new Date(`${v}T00:00:00`);return new Date(d.getFullYear(),d.getMonth(),1);}
function addMonth(d,n){return new Date(d.getFullYear(),d.getMonth()+n,1);}
function monthKey(d){return `${String(d.getFullYear()).slice(-2)}/${String(d.getMonth()+1).padStart(2,'0')}`;}
function dayValue(v){return new Date(`${v}T00:00:00`).getTime();}
function ganttGeometry(rows){const dates=rows.flatMap(x=>[x.planned_start,x.planned_end,x.forecast_end]).filter(Boolean).map(monthStart);if(!dates.length)return {months:[],start:null,end:null};let start=new Date(Math.min(...dates));let end=addMonth(new Date(Math.max(...dates)),1);const months=[];for(let d=new Date(start);d<end;d=addMonth(d,1))months.push(new Date(d));return {months,start,end};}
function pctBetween(v,g){if(!v||!g.start||!g.end)return 0;return Math.max(0,Math.min(100,(dayValue(v)-g.start.getTime())/(g.end.getTime()-g.start.getTime())*100));}
function stageDetail(row){if(!row)return `<div class="gantt-detail empty-state">${text('工程を選択すると関連QA・成果物を表示します。','选择阶段后显示关联QA与成果物。')}</div>`;const q=(row.qa_ids||[]).length?(row.qa_ids||[]).join('、'):text('なし','无');const a=(row.artifact_ids||[]).length?(row.artifact_ids||[]).join('、'):text('なし','无');return `<div class="gantt-detail"><div><span>${text('選択工程','所选阶段')}</span><b>${esc(lang==='zh-CN'?(row.label_zh||row.label_ja):row.label_ja)}</b></div><div><span>${text('関連QA','关联QA')}</span>${esc(q)}</div><div><span>${text('関連成果物','关联成果物')}</span>${esc(a)}</div><div><span>${text('予測終了','预测结束')}</span>${esc(row.forecast_end||'—')}${row.delay_days?` <em>${text('遅延','延迟')} ${row.delay_days}${text('日','天')}</em>`:''}</div></div>`;}
function renderGantt(){const rows=D.views.project_shared.gantt||[],g=ganttGeometry(rows);if(!rows.length||!g.months.length){$('project-gantt').innerHTML=`<div class="empty-state">${text('日程データがありません。','没有日程数据。')}</div>`;return;}if(!activeStage)activeStage=rows.find(x=>x.status==='delayed'||x.status==='in_progress')?.stage_id||rows[0].stage_id;const today=(D.meta.updated_at||new Date().toISOString()).slice(0,10),todayPct=pctBetween(today,g);$('project-gantt').innerHTML=`<div class="gantt-scroll"><div class="gantt-grid schedule-table" style="--month-count:${g.months.length}"><div class="gantt-corner">${text('工程','阶段')}</div>${g.months.map(m=>`<div class="gantt-month">${monthKey(m)}</div>`).join('')}${rows.map(row=>{const left=pctBetween(row.planned_start,g),planned=Math.max(1,pctBetween(row.planned_end,g)-left),forecast=Math.max(planned,pctBetween(row.forecast_end||row.planned_end,g)-left),progress=Math.max(0,Math.min(100,Number(row.progress_percentage||0)));return `<button class="gantt-stage-label ${activeStage===row.stage_id?'active':''}" data-stage="${esc(row.stage_id)}"><span>${esc(lang==='zh-CN'?(row.label_zh||row.label_ja):row.label_ja)}</span><small>${esc((row.planned_start||'').slice(0,7).replace('-','/'))}〜${esc((row.planned_end||'').slice(0,7).replace('-','/'))}</small></button><button class="gantt-timeline ${activeStage===row.stage_id?'active':''}" data-stage="${esc(row.stage_id)}"><span class="today-line" style="left:${todayPct}%"><i>${text('今日','今天')}</i></span><span class="gantt-bar forecast ${row.delay_days?'late':''}" style="left:${left}%;width:${forecast}%"></span><span class="gantt-bar plan status-${esc(row.status||'planned')}" style="left:${left}%;width:${planned}%"><span class="gantt-actual" style="width:${progress}%"></span><b>${esc(text(...statusLabel(row.status)))} ${progress}%</b></span>${row.delay_days?`<span class="delay-label" style="left:${Math.min(96,left+forecast)}%">+${row.delay_days}${text('日','天')}</span>`:''}</button>`;}).join('')}</div></div><p class="gantt-legend">${text('濃色＝実績進捗、枠＝計画、点線延長＝予測超過。','深色=实际进度，边框=计划，虚线延长=预测超期。')}</p><div id="gantt-stage-detail">${stageDetail(rows.find(x=>x.stage_id===activeStage))}</div>`;document.querySelectorAll('[data-stage]').forEach(b=>b.onclick=()=>{activeStage=b.dataset.stage;renderGantt();});}
function artifactTree(target,view){const tree=D.views[view].artifact_tree;const rows=(tree.categories||[]).flatMap(cat=>cat.artifacts||[]);$(target).innerHTML=`<div class="table-wrap"><table class="artifact-table"><thead><tr><th>${text('番号','编号')}</th><th>${text('成果物','成果物')}</th><th>Version</th><th>${text('状態','状态')}</th><th>${text('進捗','进度')}</th><th>${text('更新日','更新日期')}</th></tr></thead><tbody>${rows.map(a=>`<tr><td>${esc(a.artifact_id)}</td><td>${esc(fallback(a.title))}</td><td>${esc(String(a.version||'-').replace(/^v+/i,'v'))}</td><td>${esc(text(...statusLabel(a.status)))}</td><td>${esc(a.progress??0)}%</td><td>${esc(a.updated_at||'-')}</td></tr>`).join('')}</tbody></table></div>`;}
function render(){setHeader();renderSharedSummary();renderGantt();renderQaFilters();renderQa();artifactTree('shared-artifacts','project_shared');}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x.id===b.dataset.mode));});document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{lang=b.dataset.language;document.documentElement.lang=lang;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.toggle('active',x===b));render();});
const hash=location.hash.replace('#','');if(hash.startsWith('action/'))activeQueue=hash.split('/')[1]||'decision';if(hash.startsWith('qa/'))activeQa=hash.split('/')[1]||'waiting_customer';render();
</script>
</body>
</html>
