<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PMO Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="header">
  <div class="header-main"><div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div><div class="build-mark" id="version"></div></div>
  <div class="header-controls">
    <nav class="tabs">
      <button class="tab active" data-mode="management">PM管理</button>
      <button class="tab" data-mode="shared">プロジェクト共有</button>
    </nav>
    <div class="language-switch"><button class="lang-btn active" data-language="ja">日本語</button><button class="lang-btn" data-language="zh-CN">中文</button></div>
  </div>
</header>
<main class="container">
  <section id="management" class="mode active">
    <div class="view-toolbar"><p id="management-note"></p><button class="btn" onclick="window.print()">印刷</button></div>
    <div id="management-summary" class="summary-grid action-summary-grid"></div>
    <section class="panel inbox-panel">
      <div class="panel-head"><div><span class="eyebrow">DAILY PM WORKFLOW</span><h2>PM Action Center</h2></div><span class="panel-note" id="inbox-total"></span></div>
      <div id="pm-action-list"></div>
    </section>
    <details class="repository-drawer panel" open>
      <summary><strong id="management-artifact-title"></strong></summary>
      <div id="management-artifacts" class="artifact-tree"></div>
    </details>
  </section>

  <section id="shared" class="mode">
    <div class="view-toolbar"><p id="shared-note"></p><button class="btn" onclick="window.print()">印刷</button></div>
    <div id="shared-summary" class="summary-grid shared-summary-grid"></div>
    <div class="shared-layout">
      <section class="panel"><h2 id="progress-title"></h2><div id="project-gantt"></div></section>
      <section class="panel">
        <div class="panel-head"><h2>QA</h2><span class="panel-note" id="qa-total"></span></div>
        <div id="qa-filters" class="filter-row"></div>
        <div id="shared-qa"></div>
      </section>
      <section class="panel"><h2 id="shared-artifact-title"></h2><div id="shared-artifacts" class="artifact-tree"></div></section>
    </div>
  </section>
</main>
<script src="js/data.js"></script>
<script>
const D=window.PMO_DATA;
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let lang='ja',activeQueue='decision',activeQa='all';
const text=(ja,zh)=>lang==='zh-CN'?zh:ja;
const fallback=v=>typeof v==='object'&&v?(v[lang]||v.ja||v['zh-CN']||''):v;
const queueLabels={decision:['要決定','要决定'],overdue:['期限超過','逾期'],change_candidate:['変更候補','变更候选'],customer_waiting:['顧客回答待ち','等待客户回复'],auto_processed:['自動処理済み','自动处理完成']};
const qaLabels={all:['すべて','全部'],waiting_customer:['回答待ち','等待回复'],answer_received:['回答受領','已收到回复'],under_review:['確認中','确认中'],resolved:['解決済み','已解决'],overdue:['期限超過','逾期']};
const actionLabels={accept:['Accept','接受'],edit:['Edit','编辑'],escalate:['Escalate','升级'],complete:['完了','完成'],extend:['延期','延期'],follow_up:['Follow-up','跟进'],edit_due_date:['期限変更','修改期限'],accept_update:['更新として受入','接受为更新'],create_revision:['Revision作成','创建修订'],create_change_request:['Change Request','变更申请'],dismiss:['却下','驳回'],view_details:['詳細','详情']};
const statusLabel=v=>({review_required:['レビュー待ち','等待评审'],ready_for_approval:['承認待ち','等待批准'],approved:['確認済み','已确认'],in_review:['レビュー中','评审中'],draft:['作成中','编制中'],not_started:['未着手','未开始']}[v]||[v||'-',v||'-']);
function setHeader(){$('title').textContent=fallback(D.meta.title);$('subtitle').textContent=fallback(D.meta.subtitle);$('version').textContent=`${D.meta.version} · ${D.meta.updated_at||'-'}`;$('management-note').textContent=text('PM向けアクションを表形式で確認します。','以表格形式查看PM操作事项。');$('shared-note').textContent=text('進捗・QA・成果物を参照する読み取り専用ページです。','只读查看进度、QA和成果物。');$('management-artifact-title').textContent=text('成果物・Preview','成果物・Preview');$('shared-artifact-title').textContent=text('成果物・Preview','成果物・Preview');$('progress-title').textContent=text('プロジェクト進捗・日程','项目进度・日程');}
function renderPmSummary(){const ac=D.views.pm_management.action_center;$('management-summary').innerHTML=ac.display_order.map(k=>`<button class="summary-card clickable ${activeQueue===k?'active':''}" data-queue="${k}"><span>${esc(text(...queueLabels[k]))}</span><strong>${ac.counts[k]||0}</strong></button>`).join('');document.querySelectorAll('[data-queue]').forEach(b=>b.onclick=()=>{activeQueue=b.dataset.queue;location.hash=`action/${activeQueue}`;renderPmSummary();renderActionQueue();});}
function renderActionQueue(){const ac=D.views.pm_management.action_center,items=ac.queues[activeQueue]||[];$('inbox-total').textContent=`${text(...queueLabels[activeQueue])} · ${items.length}${text('件','项')}`;if(!items.length){$('pm-action-list').innerHTML=`<div class="empty-state">${text('現在、該当項目はありません。','当前没有对应事项。')}</div>`;return;}$('pm-action-list').innerHTML=`<div class="table-wrap"><table class="work-table"><thead><tr><th>${text('番号','编号')}</th><th>${text('内容','内容')}</th><th>Owner</th><th>${text('期限','期限')}</th><th>${text('処理','处理')}</th></tr></thead><tbody>${items.map(x=>`<tr><td class="id-cell">${esc(x.id||'-')}</td><td>${esc(fallback(x.title)||'-')}</td><td>${esc(x.owner||'-')}</td><td>${esc(x.due_date||'-')}</td><td><div class="action-buttons">${(x.available_actions||[]).map(a=>`<button type="button" data-action="${esc(a)}" title="${text('MVP 0.6で実処理に接続','MVP 0.6连接实际处理')}">${esc(text(...(actionLabels[a]||[a,a])))}</button>`).join('')}</div></td></tr>`).join('')}</tbody></table></div>`;}
function qaCounts(){return D.views.project_shared.qa_counts||{};}
function renderSharedSummary(){const s=D.summary,cards=[[text('現在フェーズ','当前阶段'),s.current_phase],[text('プロジェクト状態','项目状态'),s.status],[text('QA回答進捗','QA回复进度'),`${s.qa_resolved||0} / ${s.qa_total||0}`],[text('要確認QA','待确认QA'),`${s.qa_waiting||0}${text('件','项')}`],[text('成果物進捗','成果物进度'),`${s.artifact_completed||0} / ${s.artifact_count||0}`]];$('shared-summary').innerHTML=cards.map((c,i)=>`<button class="summary-card clickable ${i<2?'informational':''}" data-shared-index="${i}"><span>${esc(c[0])}</span><strong>${esc(c[1])}</strong></button>`).join('');document.querySelectorAll('[data-shared-index="2"],[data-shared-index="3"]').forEach(b=>b.onclick=()=>$('shared-qa').scrollIntoView({behavior:'smooth'}));document.querySelector('[data-shared-index="4"]').onclick=()=>$('shared-artifacts').scrollIntoView({behavior:'smooth'});}
function renderQaFilters(){const counts=qaCounts(),order=['all','waiting_customer','answer_received','under_review','resolved','overdue'];$('qa-filters').innerHTML=order.map(k=>`<button class="filter-btn ${activeQa===k?'active':''}" data-qa-filter="${k}">${esc(text(...qaLabels[k]))} ${k==='all'?D.views.project_shared.qa_items.length:(counts[k]||0)}</button>`).join('');document.querySelectorAll('[data-qa-filter]').forEach(b=>b.onclick=()=>{activeQa=b.dataset.qaFilter;location.hash=`qa/${activeQa}`;renderQaFilters();renderQa();});}
function renderQa(){let items=D.views.project_shared.qa_items||[];if(activeQa!=='all')items=items.filter(x=>x.shared_status===activeQa);$('qa-total').textContent=`${items.length}${text('件','项')}`;if(!items.length){$('shared-qa').innerHTML=`<div class="empty-state">${text('該当するQAはありません。','没有对应QA。')}</div>`;return;}$('shared-qa').innerHTML=`<div class="table-wrap"><table class="qa-table"><thead><tr><th>No.</th><th>${text('区分','分类')}</th><th>${text('確認事項','确认事项')}</th><th>${text('確認背景・目的','确认背景・目的')}</th><th>${text('回答','回答')}</th><th>${text('回答日','回答日期')}</th><th>${text('回答者','回答人')}</th><th>Status</th></tr></thead><tbody>${items.map((x,i)=>`<tr><td>${esc(x.number||x.qa_id||i+1)}</td><td>${esc(fallback(x.category)||'-')}</td><td class="long-text">${esc(fallback(x.question)||'-')}</td><td class="long-text">${esc(fallback(x.background)||'-')}</td><td class="long-text">${esc(fallback(x.answer)||'—')}</td><td>${esc(x.answer_date||'—')}</td><td>${esc(x.answered_by||'—')}</td><td><span class="status-chip ${esc(x.shared_status)}">${esc(text(...qaLabels[x.shared_status]))}</span></td></tr>`).join('')}</tbody></table></div>`;}
function renderGantt(){const rows=D.views.project_shared.gantt||[];$('project-gantt').innerHTML=`<div class="table-wrap"><table class="schedule-table"><thead><tr><th>${text('工程','阶段')}</th><th>${text('開始','开始')}</th><th>${text('終了','结束')}</th><th>${text('成果物','成果物')}</th><th>${text('進捗','进度')}</th><th>${text('状態','状态')}</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${esc(fallback(x.label_ja)||x.stage_id)}</td><td>${esc(x.planned_start||'—')}</td><td>${esc(x.planned_end||'—')}</td><td>${esc(x.primary_artifact_id||'-')}</td><td><div class="gantt-progress"><span style="width:${Math.max(0,Math.min(100,Number(x.progress_percentage||0)))}%"></span><em>${esc(x.progress_percentage??0)}%</em></div></td><td>${esc(text(...statusLabel(x.status||x.artifact_status)))}</td></tr>`).join('')}</tbody></table></div>`;}
function artifactTree(target,view){const tree=D.views[view].artifact_tree;$(target).innerHTML=(tree.categories||[]).map(cat=>`<details class="artifact-directory" open><summary>${esc(fallback(cat.category))}</summary><div class="artifact-directory-body"><table class="artifact-table"><thead><tr><th>${text('番号','编号')}</th><th>${text('成果物','成果物')}</th><th>Version</th><th>${text('状態','状态')}</th><th>${text('進捗','进度')}</th><th>${text('未解決QA','未解决QA')}</th><th>${text('コメント','评论')}</th><th>Preview</th></tr></thead><tbody>${(cat.artifacts||[]).map(a=>`<tr><td>${esc(a.artifact_id)}</td><td><details class="artifact-outline"><summary>${esc(fallback(a.title))}</summary>${(a.sections||[]).length?`<ol>${a.sections.map(s=>`<li>${esc(s.section_id)} ${esc(fallback(s.section_title))}</li>`).join('')}</ol>`:`<span class="muted">${text('目次なし','无目录')}</span>`}</details></td><td>${esc(String(a.version||'-').replace(/^v+/i,''))}</td><td>${esc(text(...statusLabel(a.review_status||a.status)))}</td><td>${esc(a.completion_percentage??0)}%</td><td>${esc(a.open_qa_count||0)}</td><td>${esc(a.pending_review_comment_count||0)}</td><td><a class="text-link" href="${esc((a.preview_paths||{})[lang]||a.preview_path)}" target="_blank" rel="noopener">Preview</a></td></tr>`).join('')}</tbody></table></div></details>`).join('');}
function render(){setHeader();renderPmSummary();renderActionQueue();renderSharedSummary();renderGantt();renderQaFilters();renderQa();artifactTree('management-artifacts','pm_management');artifactTree('shared-artifacts','project_shared');}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x.id===b.dataset.mode));});document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{lang=b.dataset.language;document.documentElement.lang=lang;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.toggle('active',x===b));render();});
const hash=location.hash.replace('#','');if(hash.startsWith('action/'))activeQueue=hash.split('/')[1]||'decision';if(hash.startsWith('qa/'))activeQa=hash.split('/')[1]||'all';render();
</script>
</body>
</html>
