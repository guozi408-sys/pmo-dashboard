<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PMO Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="header">
  <div class="header-main"><div><h1 id="title"></h1><div class="sub" id="subtitle"></div></div><div class="build-mark" id="version"></div></div>
  <div class="header-controls">
    <nav class="tabs">
      <button class="tab active" data-mode="management">PM管理</button>
      <button class="tab" data-mode="shared">プロジェクト共有</button>
    </nav>
    <div class="language-switch"><button class="lang-btn active" data-language="ja">日本語</button><button class="lang-btn" data-language="zh-CN">中文</button></div>
  </div>
</header>
<main class="container">
  <section id="management" class="mode active">
    <div class="view-toolbar"><p id="management-note"></p><button class="btn" onclick="window.print()">印刷</button></div>
    <div id="management-summary" class="summary-grid action-summary-grid"></div>
    <section class="panel inbox-panel">
      <div class="panel-head"><div><span class="eyebrow">DAILY PM WORKFLOW</span><h2>PM Action Center</h2></div><span class="panel-note" id="inbox-total"></span></div>
      <div id="pm-action-list"></div>
    </section>
    <details class="repository-drawer panel" open>
      <summary><strong id="management-artifact-title"></strong></summary>
      <div id="management-artifacts" class="artifact-tree"></div>
    </details>
  </section>

  <section id="shared" class="mode">
    <div class="view-toolbar"><p id="shared-note"></p><button class="btn" onclick="window.print()">印刷</button></div>
    <div id="shared-summary" class="summary-grid shared-summary-grid"></div>
    <div class="shared-layout">
      <section class="panel"><h2 id="progress-title"></h2><div id="project-gantt"></div></section>
      <section class="panel">
        <div class="panel-head"><h2>QA</h2><span class="panel-note" id="qa-total"></span></div>
        <div id="qa-filters" class="filter-row"></div>
        <div id="shared-qa"></div>
      </section>
      <section class="panel"><h2 id="shared-artifact-title"></h2><div id="shared-artifacts" class="artifact-tree"></div></section>
    </div>
  </section>
</main>
<script src="js/data.js"></script>
<script>
const D=window.PMO_DATA;
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let lang='ja', activeQueue='decision', activeQa='all';
const text=(ja,zh)=>lang==='zh-CN'?zh:ja;
const fallback=v=>typeof v==='object'&&v?(v[lang]||v.ja||v['zh-CN']||''):v;
const queueLabels={decision:['要決定','要决定'],overdue:['期限超過','逾期'],change_candidate:['変更候補','变更候选'],customer_waiting:['顧客回答待ち','等待客户回复'],auto_processed:['自動処理済み','自动处理完成']};
const qaLabels={all:['すべて','全部'],waiting_customer:['回答待ち','等待回复'],answer_received:['回答受領','已收到回复'],under_review:['確認中','确认中'],resolved:['解決済み','已解决'],overdue:['期限超過','逾期']};
const actionLabels={accept:['Accept','接受'],edit:['Edit','编辑'],escalate:['Escalate','升级'],complete:['Complete','已完成'],extend:['Extend','延期'],follow_up:['Follow up','跟进'],edit_due_date:['Edit due date','修改期限'],accept_update:['Accept as Update','接受为更新'],create_revision:['Create Revision','创建修订'],create_change_request:['Create Change Request','创建变更申请'],dismiss:['Dismiss','忽略'],view_details:['View details','查看详情']};
function setHeader(){ $('title').textContent=fallback(D.meta.title); $('subtitle').textContent=fallback(D.meta.subtitle); $('version').textContent=`${D.meta.version} · ${D.meta.updated_at||'-'}`; $('management-note').textContent=text('PM向け：対応が必要な例外を5つのキューで確認します。MVP 0.5.1は表示・絞り込みのみです。','面向PM：按5个队列查看需要关注的例外。MVP 0.5.1仅支持显示和筛选。'); $('shared-note').textContent=text('プロジェクトメンバー向け：進捗・QA・成果物を参照する読み取り専用ページです。','面向项目成员：只读查看进度、QA和成果物。'); $('management-artifact-title').textContent=text('成果物・Preview（レビュー統合）','成果物・Preview（已合并评审）'); $('shared-artifact-title').textContent=text('成果物・Preview','成果物・Preview'); $('progress-title').textContent=text('プロジェクト進捗','项目进度'); }
function renderPmSummary(){const ac=D.views.pm_management.action_center; $('management-summary').innerHTML=ac.display_order.map(k=>`<button class="summary-card clickable ${activeQueue===k?'active':''}" data-queue="${k}"><span>${esc(text(...queueLabels[k]))}</span><strong>${ac.counts[k]||0}</strong></button>`).join(''); document.querySelectorAll('[data-queue]').forEach(b=>b.onclick=()=>{activeQueue=b.dataset.queue; location.hash=`action/${activeQueue}`; renderPmSummary(); renderActionQueue();});}
function renderActionQueue(){const ac=D.views.pm_management.action_center;const items=ac.queues[activeQueue]||[];$('inbox-total').textContent=`${text(...queueLabels[activeQueue])} · ${items.length}${text('件','项')}`;if(!items.length){$('pm-action-list').innerHTML=`<div class="empty-state">${text('現在、該当項目はありません。','当前没有对应事项。')}</div>`;return;}$('pm-action-list').innerHTML=`<div class="action-list">${items.map(x=>`<article class="action-card"><div><div class="action-meta"><span>${esc(x.id||'-')}</span><span>${esc(x.source_type||'')}</span>${x.due_date?`<span>${esc(x.due_date)}</span>`:''}</div><h3>${esc(fallback(x.title))}</h3><p>${esc(x.owner||x.route||'')}</p></div><div class="action-buttons">${(x.available_actions||[]).map(a=>`<button disabled title="MVP 0.6 write-back">${esc(text(...(actionLabels[a]||[a,a])))}</button>`).join('')}</div></article>`).join('')}</div>`;}
function qaCounts(){return D.views.project_shared.qa_counts||{};}
function renderSharedSummary(){const s=D.summary;const cards=[[text('現在フェーズ','当前阶段'),s.current_phase],[text('プロジェクト状態','项目状态'),s.status],[text('QA回答進捗','QA回复进度'),`${s.qa_resolved||0} / ${s.qa_total||0}`],[text('要確認QA','待确认QA'),`${s.qa_waiting||0}${text('件','项')}`],[text('成果物進捗','成果物进度'),`${s.artifact_completed||0} / ${s.artifact_count||0}`]];$('shared-summary').innerHTML=cards.map((c,i)=>`<button class="summary-card clickable ${i<2?'informational':''}" data-shared-index="${i}"><span>${esc(c[0])}</span><strong>${esc(c[1])}</strong></button>`).join('');document.querySelectorAll('[data-shared-index="2"],[data-shared-index="3"]').forEach(b=>b.onclick=()=>{$('shared-qa').scrollIntoView({behavior:'smooth'});});document.querySelector('[data-shared-index="4"]').onclick=()=>{$('shared-artifacts').scrollIntoView({behavior:'smooth'});};}
function renderQaFilters(){const counts=qaCounts();const order=['all','waiting_customer','answer_received','under_review','resolved','overdue'];$('qa-filters').innerHTML=order.map(k=>`<button class="filter-btn ${activeQa===k?'active':''}" data-qa-filter="${k}">${esc(text(...qaLabels[k]))} ${k==='all'?D.views.project_shared.qa_items.length:(counts[k]||0)}</button>`).join('');document.querySelectorAll('[data-qa-filter]').forEach(b=>b.onclick=()=>{activeQa=b.dataset.qaFilter;location.hash=`qa/${activeQa}`;renderQaFilters();renderQa();});}
function renderQa(){let items=D.views.project_shared.qa_items||[];if(activeQa!=='all')items=items.filter(x=>x.shared_status===activeQa);$('qa-total').textContent=`${items.length}${text('件','项')}`;if(!items.length){$('shared-qa').innerHTML=`<div class="empty-state">${text('該当するQAはありません。','没有对应QA。')}</div>`;return;}$('shared-qa').innerHTML=`<div class="qa-list">${items.map(x=>`<article class="qa-card"><div class="qa-head"><strong>${esc(x.qa_id)}</strong><span class="status-chip ${esc(x.shared_status)}">${esc(text(...qaLabels[x.shared_status]))}</span></div><h3>${esc(fallback(x.question))}</h3>${x.answer?`<p class="qa-answer">${esc(fallback(x.answer))}</p>`:''}<div class="qa-meta"><span>${text('期限','期限')}: ${esc(x.due_date||'-')}</span><span>${text('担当','负责人')}: ${esc(x.asked_to||x.owner||'-')}</span><span>Evidence: ${esc(x.evidence_ref||'-')}</span></div></article>`).join('')}</div>`;}
function renderGantt(){const rows=D.views.project_shared.gantt||[];$('project-gantt').innerHTML=`<div class="gantt-list">${rows.map(x=>`<div class="gantt-row"><div><strong>${esc(fallback(x.label_ja)||x.stage_id)}</strong><small>${esc(x.primary_artifact_id)}</small></div><div class="progress-track"><span style="width:${Number(x.progress_percentage||0)}%"></span></div><strong>${esc(x.progress_percentage??0)}%</strong></div>`).join('')}</div>`;}
function artifactTree(target,view){const tree=D.views[view].artifact_tree;$(target).innerHTML=(tree.categories||[]).map(cat=>`<details class="artifact-category" open><summary>${esc(cat.category)}</summary><div class="artifact-children">${(cat.artifacts||[]).map(a=>`<article class="artifact-node"><div class="artifact-node-main"><div><strong>${esc(a.artifact_id)} · ${esc(fallback(a.title))}</strong><div class="artifact-meta"><span>v${esc(a.version||'-')}</span><span>${esc(a.status||'-')}</span><span>${text('進捗','进度')} ${esc(a.completion_percentage??0)}%</span><span>QA ${esc(a.open_qa_count||0)}</span><span>${text('レビュー','评审')} ${esc(a.review_status||'-')}</span><span>${text('コメント','评论')} ${esc(a.pending_review_comment_count||0)}</span></div></div><a class="preview-button" href="${esc((a.preview_paths||{})[lang]||a.preview_path)}" target="_blank" rel="noopener">Preview</a></div>${(a.sections||[]).length?`<details class="artifact-sections"><summary>${text('セクション','章节')} ${(a.sections||[]).length}</summary><ul>${a.sections.map(s=>`<li>${esc(s.section_id)} · ${esc(fallback(s.section_title))}</li>`).join('')}</ul></details>`:''}</article>`).join('')}</div></details>`).join('');}
function render(){setHeader();renderPmSummary();renderActionQueue();renderSharedSummary();renderGantt();renderQaFilters();renderQa();artifactTree('management-artifacts','pm_management');artifactTree('shared-artifacts','project_shared');}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x.id===b.dataset.mode));});document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{lang=b.dataset.language;document.documentElement.lang=lang;document.querySelectorAll('.lang-btn').forEach(x=>x.classList.toggle('active',x===b));render();});
const hash=location.hash.replace('#','');if(hash.startsWith('action/'))activeQueue=hash.split('/')[1]||'decision';if(hash.startsWith('qa/'))activeQa=hash.split('/')[1]||'all';render();
</script>
</body>
</html>
